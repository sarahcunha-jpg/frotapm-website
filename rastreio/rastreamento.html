<!-- name=rastreio/rastreamento.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Rastreamento em Tempo Real - Frota PM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style> html,body,#map{height:100%;margin:0;padding:0} #map{height:100vh} </style>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <!-- Substitua YOUR_GOOGLE_MAPS_API_KEY pela sua chave -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY"></script>
</head>
<body>
  <div id="map"></div>
  <script>
    // Ajuste para sua URL de backend (incluir https:// em produção)
    const SOCKET_URL = 'https://YOUR_SERVER_URL';
    const socket = io(SOCKET_URL);
    const markers = {};
    const polylines = {};

    const map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: -26.9183, lng: -49.0650 }, // Blumenau
      zoom: 12,
    });

    socket.on('connect', () => {
      console.log('socket conectado', socket.id);
      // Exemplo: inscrever-se em viaturas específicas
      // socket.emit('subscribe', { viaturas: ['uuid-viatura-1'] });
    });

    socket.on('posicao:update', (p) => {
      const id = p.viatura_id;
      const latlng = { lat: Number(p.latitude), lng: Number(p.longitude) };
      if (!markers[id]) {
        markers[id] = new google.maps.Marker({
          position: latlng,
          map,
          title: 'Viatura ' + id,
          icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 5, rotation: p.heading || 0, fillColor: '#007bff' }
        });
        polylines[id] = new google.maps.Polyline({ path: [latlng], geodesic: true, strokeColor: '#007bff', map });
      } else {
        markers[id].setPosition(latlng);
        polylines[id].getPath().push(new google.maps.LatLng(latlng.lat, latlng.lng));
      }
      // Atualize painel lateral/informações conforme sua UI
      console.log('viatura', id, 'vel:', p.velocidade, 'time:', p.data_hora);
    });

    socket.on('disconnect', () => console.log('socket desconectado'));
  </script>
</body>
</html>
