<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Digital Multi-Zonas | FrotaPM</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/relogio.css">
</head>
<body>
    <!-- Background Animation -->
    <div class="stars"></div>
    <div class="bg-animation"></div>

    <!-- Main Container -->
    <div class="container-relogio">
        <!-- Header -->
        <header class="header-relogio">
            <div class="logo-section">
                <i class="fas fa-globe"></i>
                <h1>Relógio Global</h1>
                <p>Monitore a hora em diferentes fusos horários</p>
            </div>
            <div class="controls">
                <button id="btn-adicionar" class="btn btn-add" title="Adicionar fuso horário">
                    <i class="fas fa-plus"></i> Adicionar Fuso
                </button>
                <button id="btn-tema" class="btn btn-theme" title="Mudar tema">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <!-- Timezone Selection Modal -->
        <div id="modal-fuso" class="modal-fuso">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Adicionar Fuso Horário</h2>
                    <button class="btn-close" onclick="fecharModalFuso()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <input type="text" id="search-fuso" class="search-input" placeholder="Buscar fuso horário...">
                    <div id="lista-fusos" class="lista-fusos"></div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content-relogio">
            <!-- Relógios Principal -->
            <div class="relogios-container" id="relogios-container">
                <!-- Clocks will be added here by JavaScript -->
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-content">
                        <h3>Fusos Monitorados</h3>
                        <p id="stat-fusos">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-earth-americas"></i>
                    </div>
                    <div class="stat-content">
                        <h3>Cidades</h3>
                        <p id="stat-cidades">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-hourglass-start"></i>
                    </div>
                    <div class="stat-content">
                        <h3>Diferença Máx.</h3>
                        <p id="stat-diferenca">0h</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/timezone-data.js"></script>
    <script src="js/relogio.js"></script>
</body>
</html>
