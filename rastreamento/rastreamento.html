<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreamento - FrotaPM</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html,body,#map { height: 100%; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; }
        .info { padding: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info">Mapa de rastreamento — marcadores criados a partir dos dados locais.</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Carrega os dados do projeto para usar como fonte de marcadores -->
    <script src="../js/dados.js"></script>
    <script>
        // Inicializa mapa simples centrado em Blumenau
        var map = L.map('map').setView([-26.9168, -49.0683], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Se a variável viaturas estiver definida, plota marcadores dinâmicos
        if (typeof viaturas !== 'undefined' && Array.isArray(viaturas)) {
            viaturas.forEach(function(v) {
                if (v.latitude && v.longitude) {
                    L.marker([v.latitude, v.longitude]).addTo(map).bindPopup(`<strong>${v.placa}</strong><br>${v.modelo}`);
                }
            });
        } else {
            // Fallback marcador
            L.marker([-26.9168, -49.0683]).addTo(map).bindPopup('Localização padrão');
        }

        // Se quiser, abrir popup automático
        // setTimeout(function(){ map.openPopup(); }, 800);
    </script>
</body>
</html>
