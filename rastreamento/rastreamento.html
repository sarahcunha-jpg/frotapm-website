<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreamento - FrotaPM</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html,body,#map { height: 100%; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; }
        .info { padding: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info">Mapa de rastreamento - dados de exemplo. Feche esta aba para retornar ao painel.</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializa mapa simples centrado em Blumenau
        var map = L.map('map').setView([-26.9168, -49.0683], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Marcadores de exemplo a partir dos dados existentes (se disponíveis via parent)
        var markers = [
            [-26.9168, -49.0683, 'PM-0001'],
            [-26.9175, -49.0675, 'PM-0002'],
            [-26.9200, -49.0700, 'PM-0003']
        ];

        markers.forEach(function(m) {
            L.marker([m[0], m[1]]).addTo(map).bindPopup(m[2]);
        });
    </script>
</body>
</html>
